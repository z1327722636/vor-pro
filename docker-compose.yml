services:
  postgres:
    image: postgres:16-alpine
    container_name: vor-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vor_password}
      POSTGRES_DB: ${POSTGRES_DB:-vor}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vor} -d ${POSTGRES_DB:-vor}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vor-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: vor-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-vor_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-vor_minio_password}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: vor-api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./storage:/app/storage
    profiles: ["app"]

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    container_name: vor-web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "2367:2367"
    depends_on:
      - api
    profiles: ["app"]

volumes:
  postgres-data:
  redis-data:
  minio-data:
